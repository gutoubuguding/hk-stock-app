services:
  db:
    image: postgres:16-alpine
    container_name: hk-stock-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hk_stock}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    container_name: hk-stock-ai-service
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-hk_stock}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PYTHON_EXECUTABLE: python
      APP_SCRIPT_ROOT: /app/scripts
      FUTU_OPEND_HOST: ${FUTU_OPEND_HOST:-host.docker.internal}
      FUTU_OPEND_PORT: ${FUTU_OPEND_PORT:-11111}
      TZ: Asia/Shanghai
    ports:
      - "8082:8082"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: hk-stock-backend
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      SERVER_ADDRESS: 0.0.0.0
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-hk_stock}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-hk_stock}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      AI_SERVICE_URL: http://ai-service:8082
      PYTHON_EXECUTABLE: python3
      APP_SCRIPT_ROOT: /app/scripts
      FUTU_OPEND_HOST: ${FUTU_OPEND_HOST:-host.docker.internal}
      FUTU_OPEND_PORT: ${FUTU_OPEND_PORT:-11111}
      TZ: Asia/Shanghai
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: hk-stock-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - ai-service

volumes:
  postgres_data:
